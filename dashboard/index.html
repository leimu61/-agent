<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎓 如意学伴 · 学习仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Noto+Sans+SC:wght@400;500;600;700&amp;family=Noto+Serif+SC:wght@600;700&amp;display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--brand:#0EA5E9;--brand-light:#38BDF8;--brand-lighter:#E0F2FE;--brand-dark:#0369A1;--accent:#F59E0B;--accent-light:#FDE68A;--bg:#F0F9FF;--card:rgba(255,255,255,.78);--glass-border:rgba(255,255,255,.2);--text:rgba(15,23,42,.92);--text-second:#475569;--text-muted:#94A3B8;--sub:#64748B;--color-timer-break:#0EA5E9;--sidebar-w:200px;--shadow-card:0 2px 12px rgba(14,165,233,.08);--shadow-glass:0 8px 32px rgba(14,165,233,.12);--hm-0:#F0F9FF;--hm-1:#BAE6FD;--hm-2:#7DD3FC;--hm-3:#38BDF8;--hm-4:#0EA5E9;--hm-5:#0284C7;--hm-done:#10B981;--hm-overdue:#EF4444;--hm-review:#8B5CF6}
body{font-family:"Space Grotesk","Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column;position:relative;font-weight:400;line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body::before{content:'';position:fixed;inset:0;background:url('color4bg_white.png') center/cover fixed no-repeat;opacity:.4;z-index:-1;pointer-events:none}
.app-layout,.header,.chat-fab,.chat-panel{position:relative;z-index:1}
.header{background:linear-gradient(135deg,var(--brand-dark) 0%,var(--brand) 50%,var(--brand-light) 100%);color:#fff;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.header h1{font-family:'Noto Serif SC','PingFang SC',serif;font-size:1.5em;font-weight:700;letter-spacing:.02em}
.hdr-right{display:flex;align-items:center;gap:12px}
.clock{font-size:.95em;opacity:.9;font-family:'Space Grotesk',monospace;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.empty{color:var(--sub);text-align:center;padding:24px;font-size:.9em}
.card{background:var(--card);border-radius:16px;box-shadow:var(--shadow-glass);padding:20px;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--glass-border);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:all .3s ease}
.card h3{font-size:1em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:center;gap:6px;font-weight:600;letter-spacing:-.01em}
.btn{padding:8px 20px;border:none;border-radius:9999px;font-size:.9em;cursor:pointer;font-weight:500;transition:all .2s}
.btn:active{transform:scale(.96)}
.btn:hover{opacity:.85;transform:translateY(-1px)}
.btn-start{background:var(--brand);color:#fff}
.btn-pause{background:var(--accent);color:#fff}
.btn-stop{background:var(--sub);color:#fff}
.btn-resume{background:var(--brand);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ===== Timer Ring (SVG 进度环) ===== */
.timer-ring-wrap{position:relative;width:200px;height:200px;margin:0 auto;flex-shrink:0}
.timer-ring{width:100%;height:100%;transform:rotate(-90deg)}
.timer-ring-bg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:7}
.timer-ring-progress{fill:none;stroke:var(--brand);stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset .5s ease,stroke .3s}
.timer-ring-progress.break{stroke:var(--color-timer-break)}
.timer-ring-progress.paused{stroke:#FF9800}
.timer-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-ring-text{font-family:'Space Grotesk','PingFang SC',sans-serif;font-size:2.8em;font-weight:600;letter-spacing:-.03em;font-variant-numeric:tabular-nums;color:var(--brand);line-height:1;transition:color .3s}
.timer-ring-text.ticking{animation:timer-glow 2s ease-in-out infinite}
.timer-ring-text.break-mode{color:var(--color-timer-break)}
.timer-ring-label{font-size:.82em;color:var(--sub);margin-top:4px;min-height:1.3em;text-align:center;line-height:1.3}
.timer-ring-cycle{font-size:.72em;color:var(--brand);font-weight:500;margin-top:2px;min-height:1.2em}

/* ===== 单按钮主操作区 ===== */
.pomo-action{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0}
.pomo-action .btn-main{min-width:160px;padding:12px 36px;border:none;border-radius:9999px;font-size:1.05em;font-weight:600;cursor:pointer;transition:all .25s;font-family:inherit;letter-spacing:.02em}
.pomo-action .btn-main:active{transform:scale(.95)}
.pomo-action .btn-main.start{background:var(--brand);color:#fff;box-shadow:0 4px 20px rgba(14,165,233,.35)}
.pomo-action .btn-main.pause{background:var(--accent);color:#fff;box-shadow:0 4px 20px rgba(245,158,11,.3)}
.pomo-action .btn-main.resume{background:var(--brand);color:#fff;box-shadow:0 4px 20px rgba(14,165,233,.35)}
.pomo-action .btn-main.break{background:var(--color-timer-break);color:#fff;box-shadow:0 4px 20px rgba(34,197,94,.3)}
.pomo-action .btn-main.stop-all{background:var(--sub);color:#fff;opacity:.7}
.pomo-action .btn-stop-circle{width:40px;height:40px;border-radius:50%;border:2px solid rgba(100,116,139,.25);background:transparent;color:var(--sub);font-size:.95em;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.pomo-action .btn-stop-circle:hover{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.08)}
.pomo-action .btn-stop-circle:disabled{opacity:.25;cursor:not-allowed;border-color:rgba(100,116,139,.12)}

/* ===== 折叠设置区 ===== */
.pomo-config{max-width:320px;margin:8px auto 0}
.pomo-config details{font-size:.8em}
.pomo-config summary{cursor:pointer;color:var(--sub);font-size:.85em;padding:4px 0;user-select:none;text-align:center;list-style:none}
.pomo-config summary::-webkit-details-marker{display:none}
.pomo-config summary:hover{color:var(--brand)}
.pomo-config-body{display:flex;flex-direction:column;gap:6px;padding:8px 0}
.pomo-config-row{display:flex;gap:8px;align-items:center;justify-content:center}
.pomo-config-row label{display:flex;align-items:center;gap:4px;color:var(--sub);font-size:.9em}
.pomo-config-row input{width:48px;padding:3px 6px;border:1px solid #ddd;border-radius:6px;text-align:center;font-size:.9em;outline:none}
.pomo-config-row input:focus{border-color:var(--brand)}
.pomo-config-inputs{display:flex;gap:6px}
.pomo-config-inputs input{flex:1;padding:5px 10px;border:1px solid #ddd;border-radius:6px;font-size:.9em;outline:none;min-width:0}
.pomo-config-inputs input:focus{border-color:var(--brand)}
.pomo-history{max-height:100px;overflow-y:auto;font-size:.78em;margin-top:4px}
.pomo-history .h-item{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(0,0,0,.04);color:var(--sub)}

/* ===== 番茄钟 70/30 上下分割 ===== */
.pomo-split-card{display:flex;flex-direction:column;padding:0;overflow:hidden;height:100%;background:var(--card);border-radius:16px;box-shadow:var(--shadow-glass);border:1px solid var(--glass-border);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.pomo-split-card h3{padding:16px 20px 0;margin-bottom:0;border-bottom:none}
.pomo-split-top{flex:7;padding:12px 20px 20px;display:flex;flex-direction:column;align-items:center;background:var(--card);overflow-y:auto}
.pomo-split-divider{height:1px;background:linear-gradient(to right,transparent,rgba(0,0,0,.06),transparent);margin:0 16px;flex-shrink:0}
.pomo-split-bottom{flex:3;min-height:80px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,#0c1445 0%,#1a237e 30%,#283593 55%,#0d47a1 75%,#01579b 100%);
  position:relative;overflow:hidden}
/* Moon reflection */
.pomo-split-bottom::before{content:'';position:absolute;top:8%;left:50%;transform:translateX(-50%);
  width:48px;height:48px;border-radius:50%;
  background:radial-gradient(circle at 40% 40%,#fffde7,#fff9c4 40%,rgba(255,249,196,.3) 70%,transparent 100%);
  box-shadow:0 0 40px 10px rgba(255,249,196,.15),0 0 80px 30px rgba(255,249,196,.08)}
/* Moonlight reflection on water */
.pomo-split-bottom::after{content:'';position:absolute;top:22%;left:42%;width:16%;height:60%;
  background:linear-gradient(180deg,rgba(255,249,196,.12) 0%,rgba(255,249,196,.06) 30%,rgba(255,249,196,.02) 60%,transparent 100%);
  clip-path:polygon(45% 0,55% 0,60% 100%,40% 100%);
  animation:moon-glint 4s ease-in-out infinite}
@keyframes moon-glint{0%,100%{opacity:.6}50%{opacity:1}}
/* Subtle wave overlay */
.pomo-split-bottom .wave-overlay{position:absolute;bottom:0;left:0;right:0;height:30%;
  background:repeating-linear-gradient(100deg,transparent,transparent 30px,rgba(255,255,255,.02) 30px,rgba(255,255,255,.02) 32px);
  mask-image:linear-gradient(to top,rgba(0,0,0,.3),transparent)}
.pomo-split-bottom .bottom-text{position:relative;z-index:2;color:rgba(255,255,255,.92);font-size:.9em;
  font-weight:600;text-align:center;line-height:1.6;text-shadow:0 2px 8px rgba(0,0,0,.4),0 0 20px rgba(255,249,196,.1)}
.app-layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--card);border-right:1px solid rgba(0,0,0,.06);display:flex;flex-direction:column;padding:12px 8px;gap:4px;flex-shrink:0}
.sidebar .tab{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 12px;border:none;border-radius:8px;background:transparent;color:var(--text-second);font-size:.9em;font-weight:500;font-family:'Noto Sans SC','PingFang SC',sans-serif;cursor:pointer;transition:all .2s;text-align:center;width:100%}
.sidebar .tab:hover{background:var(--brand-lighter);color:var(--brand)}
.sidebar .tab.active{background:var(--brand-lighter);color:var(--brand);font-weight:600}
.main-content{flex:1;overflow-y:auto;padding:0}
.view{display:none;padding:16px 24px 24px;height:100%}
.view.active{display:block}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:16px}
.home-full{grid-column:1/-1}
.hm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hm-header-left{display:flex;align-items:center;gap:6px;font-size:.75em;color:var(--text-muted)}
.hm-progress-ring{width:48px;height:48px;flex-shrink:0;position:relative}
.hm-progress-ring svg{width:48px;height:48px;transform:rotate(-90deg)}
.hm-progress-ring .ring-bg{fill:none;stroke:var(--bg);stroke-width:4}
.hm-progress-ring .ring-fg{fill:none;stroke:var(--brand);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.hm-progress-ring .ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.7em;font-weight:700;color:var(--text)}
.hm-legend{display:flex;gap:10px;font-size:.65em;color:var(--text-muted);flex-wrap:wrap;margin-bottom:6px}
.hm-legend-item{display:flex;align-items:center;gap:3px}
.hm-legend-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.hm-legend-swatch.lv1{background:var(--hm-1)}
.hm-legend-swatch.lv2{background:var(--hm-2)}
.hm-legend-swatch.lv3{background:var(--hm-3)}
.hm-legend-swatch.lv4{background:var(--hm-4)}
.hm-legend-swatch.lv5{background:var(--hm-5)}
.hm-legend-swatch.done{background:var(--hm-done)}
.hm-legend-swatch.overdue{background:var(--hm-overdue)}
.hm-grid{display:grid;grid-template-columns:auto repeat(7,1fr);gap:2px;font-size:.65em}
.hm-grid .hm-labels{font-size:.7em;color:var(--text-muted);padding:2px 4px 2px 0;text-align:right;align-self:center;font-weight:500}
.hm-grid .hm-dow{padding:2px 0;text-align:center;color:var(--text-muted);font-size:.85em;font-weight:500}
.hm-grid .hm-dow.weekend{opacity:.4}
.hm-cell{aspect-ratio:1;border-radius:3px;cursor:pointer;position:relative;transition:all .15s;border:1px solid transparent}
.hm-cell:hover{transform:scale(1.2);z-index:2;border-color:var(--brand);box-shadow:0 0 8px rgba(14,165,233,.25)}
.hm-cell.lv0{background:var(--hm-0)}
.hm-cell.lv1{background:var(--hm-1)}
.hm-cell.lv2{background:var(--hm-2)}
.hm-cell.lv3{background:var(--hm-3)}
.hm-cell.lv4{background:var(--hm-4)}
.hm-cell.lv5{background:var(--hm-5)}
.hm-cell.done{background:var(--hm-done)!important}
.hm-cell.overdue{animation:hm-overdue-pulse 2s ease-in-out infinite;border-color:var(--hm-overdue)}
.hm-cell.today{border-color:var(--brand)!important;box-shadow:0 0 0 2px var(--brand-lighter),0 0 8px rgba(14,165,233,.2)!important}
.hm-cell.empty{opacity:0;pointer-events:none}
.hm-tooltip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--glass-border);border-radius:8px;padding:8px 10px;font-size:1.1em;white-space:nowrap;z-index:20;pointer-events:none;box-shadow:var(--shadow-glass);line-height:1.5;min-width:140px}
.hm-tooltip .tt-date{font-weight:600;color:var(--brand);font-size:.9em}
.hm-tooltip .tt-status{font-size:.8em;color:var(--text-second);margin:2px 0}
.hm-tooltip .tt-topics{font-size:.75em;color:var(--text-muted);max-width:200px;overflow:hidden;text-overflow:ellipsis}
.hm-cell:hover .hm-tooltip{display:block}
.hm-progress-bar{display:flex;align-items:center;gap:8px;margin-top:6px;padding-top:6px;border-top:1px solid var(--glass-border)}
.hm-progress-bar .pb-track{flex:1;height:4px;border-radius:2px;background:var(--bg);overflow:hidden}
.hm-progress-bar .pb-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--brand),var(--brand-light));transition:width .6s ease}
.hm-progress-bar .pb-label{font-size:.7em;color:var(--text-muted);white-space:nowrap;font-weight:500}
.hm-empty{color:var(--sub);text-align:center;padding:24px;font-size:.85em;line-height:1.6}

@keyframes hm-overdue-pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.3)}50%{box-shadow:0 0 0 4px rgba(239,68,68,.12)}}
.pomo-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;height:calc(100vh - 120px)}
.mistakes-layout{display:grid;grid-template-columns:1fr 1fr;gap:24px;height:calc(100vh - 120px)}
.mistakes-list-panel{overflow-y:auto!important}
.mistakes-detail-panel{background:var(--card);border-radius:16px;box-shadow:var(--shadow-glass);padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);font-size:.9em;overflow-y:auto;border:1px solid var(--glass-border);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.mistakes-detail-panel.has-content{justify-content:flex-start;align-items:flex-start}
.mistakes-detail-panel .empty-state{text-align:center;color:var(--text-muted)}
.pomo-display{text-align:center;padding:8px 0;flex:1}
.timer{font-family:'Space Grotesk','PingFang SC',sans-serif;font-size:4em;font-weight:500;letter-spacing:-.03em;font-variant-numeric:tabular-nums;color:var(--brand);line-height:1}
.timer.ticking{animation:timer-glow 2s ease-in-out infinite}
.timer.break-mode{color:var(--color-timer-break)}
@keyframes timer-glow{0%,100%{text-shadow:0 0 20px rgba(14,165,233,.15),0 0 40px rgba(14,165,233,.05)}50%{text-shadow:0 0 28px rgba(14,165,233,.25),0 0 60px rgba(14,165,233,.1)}}
.timer-label{font-size:.85em;color:var(--sub);margin:2px 0}
.cycle-info{font-size:.8em;color:var(--brand);font-weight:500;margin:2px 0;min-height:1.2em}
.pomo-settings{display:flex;gap:6px;justify-content:center;margin:6px 0;font-size:.8em;color:var(--sub)}
.pomo-settings input{width:48px;padding:3px 6px;border:1px solid #ddd;border-radius:6px;text-align:center;font-size:.85em;outline:none;margin:0 2px}
.pomo-settings input:focus{border-color:var(--brand)}
.pomo-inputs{display:flex;gap:6px;margin:6px 0}
.pomo-inputs input{flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:.85em;outline:none}
.pomo-inputs input:focus{border-color:var(--brand)}
.pomo-btns{display:flex;gap:8px;justify-content:center}
.pomo-history{max-height:120px;overflow-y:auto;margin-top:8px;font-size:.8em}
.pomo-history .h-item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f0f0;color:var(--sub)}
.stats-header{font-size:1.5em;text-align:center;font-weight:700;color:var(--brand);margin:4px 0}
.stats-chart{flex:1;min-height:0}

/* ===== Streak Bar (连续打卡条) ===== */
.streak-hero-bar{background:var(--card);border-radius:12px;box-shadow:var(--shadow-card);margin-bottom:16px;padding:16px 20px}
.streak-hero-inner{display:flex;align-items:center;gap:16px}
.streak-hero-left{display:flex;align-items:center;gap:8px;flex-shrink:0}
.streak-fire{font-size:2em;line-height:1}
.streak-count{font-size:2.8em;font-weight:700;color:var(--brand);letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.streak-label{font-size:.8em;color:var(--text-second);white-space:nowrap}
.streak-hero-right{flex:1;min-width:0;max-width:280px}
.streak-dow{text-align:center;font-size:.65em;color:var(--text-muted);padding:2px 0;font-weight:500}
.streak-dow:nth-last-child(-n+2){opacity:.4}
.streak-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px}
.streak-cell{width:100%;aspect-ratio:1;border-radius:4px;background:var(--bg);transition:all .2s;cursor:default}
.streak-cell.active{background:var(--brand-light)}
.streak-cell.today{box-shadow:0 0 0 2px var(--brand)}
.streak-hero-footer{display:flex;justify-content:space-between;font-size:.75em;color:var(--text-muted)}
.streak-best{color:var(--text-second);font-weight:500}
.streak-today{font-weight:500}
.streak-empty{color:var(--sub);text-align:center;padding:24px;font-size:.9em;line-height:1.6}

/* ===== Calendar (计划日历) ===== */
.cal-nav{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.cal-nav-btn{padding:4px 14px;border:1px solid #ddd;border-radius:6px;background:var(--card);color:var(--text-second);font-size:.8em;cursor:pointer;transition:all .2s}
.cal-nav-btn:hover{background:var(--brand-lighter);border-color:var(--brand);color:var(--brand)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px}
.cal-hdr{text-align:center;font-size:.7em;color:var(--text-muted);padding:4px 0;font-weight:500}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;font-size:.8em;cursor:pointer;transition:all .15s;color:var(--text-second);position:relative;gap:2px;border:1px solid transparent}
.cal-cell:hover{background:var(--brand-lighter)}
.cal-cell.other{color:var(--text-muted);opacity:.35}
.cal-cell.today{background:var(--brand);color:#fff;font-weight:600}
.cal-cell.selected{border-color:var(--brand);background:var(--brand-lighter);font-weight:600}
.cal-cell.today.selected{border-color:#fff;background:var(--brand-dark)}
.cal-detail{border-top:1px solid var(--glass-border);padding-top:12px;margin-top:4px}
.cal-detail-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cal-tasks{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto;font-size:.8em}
.cal-task{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;background:var(--bg);transition:all .15s}
.cal-task:hover{background:var(--brand-lighter)}
.cal-task.done{opacity:.5}
.cal-tsubj{font-weight:600;color:var(--brand);font-size:.85em}
.cal-ttopic{color:var(--text-second);flex:1}
.cal-thrs{color:var(--text-muted);font-size:.8em;font-weight:500}
.cal-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.cal-dot.review{background:#e65100}
.cal-dot.completed{background:var(--brand)}
.cal-dot.pending{background:#ccc}
.week-summary{text-align:center;padding:4px 0;font-size:.75em;color:var(--text-muted);margin-top:4px}

/* ===== Chat Panel (聊天面板) ===== */
.chat-fab{position:fixed;bottom:28px;right:28px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--brand) 0%,var(--brand-light) 100%);color:#fff;border:none;font-size:1.4em;cursor:pointer;box-shadow:0 4px 16px rgba(14,165,233,.35);z-index:1000;transition:all .25s;display:flex;align-items:center;justify-content:center}
.chat-fab:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(14,165,233,.45)}
.chat-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:998;display:none;opacity:0;transition:opacity .3s ease}
.chat-backdrop.show{display:block;opacity:1}
.chat-panel{position:fixed;bottom:28px;right:28px;width:360px;max-height:520px;background:var(--card);border-radius:16px;box-shadow:var(--shadow-glass);border:1px solid var(--glass-border);display:flex;flex-direction:column;z-index:999;transform:translateY(20px) scale(.95);opacity:0;pointer-events:none;transition:all .3s ease;overflow:hidden}
.chat-panel.open{transform:translateY(0) scale(1);opacity:1;pointer-events:auto}
.chat-panel-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--glass-border);font-weight:600;font-size:.95em;color:var(--text)}
.chat-panel-hd button{background:none;border:none;font-size:1.2em;cursor:pointer;color:var(--text-muted);transition:color .2s}
.chat-panel-hd button:hover{color:var(--text)}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;font-size:.9em}
.chat-msg{padding:8px 12px;border-radius:12px;max-width:85%;line-height:1.5;word-break:break-word}
.chat-msg.bot{align-self:flex-start;background:var(--bg);color:var(--text);border:1px solid var(--glass-border)}
.chat-msg.user{align-self:flex-end;background:var(--brand);color:#fff}
.chat-input-wrap{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--glass-border);background:var(--card)}
.chat-input-wrap input{flex:1;padding:6px 12px;border:1px solid #ddd;border-radius:9999px;font-size:.9em;outline:none;font-family:inherit}
.chat-input-wrap input:focus{border-color:var(--brand)}
.chat-input-wrap button{width:32px;height:32px;border-radius:50%;border:none;background:var(--brand);color:#fff;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.chat-input-wrap button:hover{background:var(--brand-dark)}
.chat-typing{padding:4px 16px;font-size:.8em;color:var(--text-muted);font-style:italic}
.quiz-layout{display:grid;grid-template-columns:1fr 320px;gap:16px;min-height:100%}.quiz-main{display:flex;flex-direction:column;gap:12px}.quiz-topbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.quiz-topbar select{padding:5px 10px;border:1px solid #ddd;border-radius:8px;font-size:.85em;outline:none;font-family:inherit;background:var(--card)}.quiz-topbar input{padding:5px 10px;border:1px solid #ddd;border-radius:8px;font-size:.85em;outline:none}.quiz-qcard{background:var(--card);border-radius:12px;padding:20px;box-shadow:var(--shadow-card)}.quiz-qcard .q-meta{display:flex;gap:8px;align-items:center;font-size:.78em;color:var(--sub);margin-bottom:10px}.quiz-qcard .q-meta .badge{background:var(--brand-lighter);color:var(--brand-dark);padding:2px 8px;border-radius:4px;font-weight:500}.quiz-qcard .q-ct{font-size:.95em;line-height:1.7;white-space:pre-wrap;margin-bottom:14px}.quiz-answer-area{display:flex;flex-direction:column;gap:8px}.quiz-answer-area textarea{width:100%;min-height:70px;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:.9em;resize:vertical;outline:none;font-family:inherit}.quiz-answer-area textarea:focus{border-color:var(--brand)}.quiz-feedback{background:var(--card);border-radius:12px;padding:16px;margin-top:12px;display:none}.quiz-feedback.correct{border-left:3px solid #10B981}.quiz-feedback.wrong{border-left:3px solid #EF4444}.quiz-feedback .fb-kp{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}.quiz-feedback .fb-kp span{background:var(--brand-lighter);color:var(--brand-dark);padding:1px 8px;border-radius:4px;font-size:.75em}.quiz-sidebar{display:flex;flex-direction:column;gap:12px}.quiz-recs .rec-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--card);border-radius:8px;margin-bottom:6px;cursor:pointer;border:1px solid var(--glass-border)}.quiz-recs .rec-item:hover{background:var(--brand-lighter);border-color:var(--brand)}.quiz-stats{text-align:center;padding:12px;background:var(--card);border-radius:12px}.quiz-stats .stat-num{font-size:1.8em;font-weight:700;color:var(--brand)}@media(max-width:860px){.quiz-layout{grid-template-columns:1fr}.quiz-sidebar{display:none}}
</style>

<script>
const API = '/api';

function switchView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.sidebar .tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelector(`.sidebar .tab[data-view="${name}"]`).classList.add('active');
  if(name==='home'){updateStreak();renderEbbinghaus();}
  if(name==='pomo'){updateStats();}
  if(name==='mistakes'){updateMistakes();}
  if(name==='quiz'){updateQuizRecommendations();}
}

let timer = {status:'idle',subject:'数据结构',topic:'',startTs:0,pausedOffset:0,workSec:25*60,breakSec:5*60,totalCycles:1,currentCycle:0,sessions:[]};
let sessions = [], plan = {}, weakPoints = [];
let timerInterval, chart;
const RING_CIRC = 553.1; // circumference = 2 * PI * 88

function tick(){document.getElementById('clock').textContent=new Date().toLocaleString('zh-CN',{weekday:'short',hour:'2-digit',minute:'2-digit',second:'2-digit'});}
setInterval(tick,1000);tick();

async function apiGET(p){const r=await fetch(API+p);return r.json()}
async function apiPOST(p,d){const r=await fetch(API+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});return r.json()}

function fmtTime(s){s=Math.max(0,Math.floor(s));const m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}
function getInputVal(id){return document.getElementById(id).value.trim()}
function getElapsed(){if(!timer.startTs)return 0;return Math.max(0,(Date.now()-timer.startTs)/1000-timer.pausedOffset)}

function isBreakMode(){return timer.status==='break'}
function currentDuration(){return isBreakMode()?timer.breakSec:timer.workSec}

function updateTimerUI(){
  const textEl=document.getElementById('timer-text'),label=document.getElementById('timer-label');
  const cycl=document.getElementById('cycle-info'),hist=document.getElementById('pomo-history');
  const ring=document.getElementById('timer-progress'),btn=document.getElementById('btn-pomo-main');
  const stopBtn=document.getElementById('btn-pomo-stop');
  if(!textEl)return;
  const elapsed=getElapsed(),dur=currentDuration(),remain=Math.max(0,dur-elapsed);
  const progress=dur>0?remain/dur:1;

  // SVG ring progress
  if(ring)ring.setAttribute('stroke-dashoffset',RING_CIRC*(1-progress));

  textEl.classList.remove('ticking','break-mode');
  if(timer.status==='running'||timer.status==='break'){
    textEl.textContent=fmtTime(remain);
    textEl.classList.add('ticking');
    if(isBreakMode())textEl.classList.add('break-mode');
    if(ring)ring.classList.toggle('break',isBreakMode());
    if(remain<=0)onTimerEnd();
  }else if(timer.status==='paused'){
    textEl.textContent='⏸';
    if(ring)ring.classList.add('paused');
  }else{
    textEl.textContent=fmtTime(timer.workSec);
    if(ring){ring.classList.remove('break','paused');ring.setAttribute('stroke-dashoffset',RING_CIRC)}
  }

  // Label
  if(label){
    if(timer.status==='idle')label.textContent='准备开始';
    else if(timer.status==='paused')label.textContent=(isBreakMode()?'休息':timer.subject||'')+' · 已暂停';
    else if(isBreakMode())label.textContent='☕ 休息中 · '+fmtTime(remain);
    else label.textContent=(timer.subject||'')+' '+(timer.topic||'')+' · '+fmtTime(remain);
  }

  // Cycle info
  if(cycl){
    if(timer.status==='idle'){
      const w=Math.floor(timer.workSec/60),b=Math.floor(timer.breakSec/60);
      cycl.textContent=timer.totalCycles>1?'学习'+w+'分 · 休息'+b+'分 · '+timer.totalCycles+'轮':'';
    }else{
      cycl.textContent='第'+timer.currentCycle+'/'+timer.totalCycles+'轮 · '+(isBreakMode()?'☕ 休息':'🍅 学习中');
    }
  }

  // Single dynamic button
  if(btn){
    const s=timer.status;
    if(s==='idle'){btn.textContent='▶ 开始学习';btn.className='btn-main start';btn.disabled=false}
    else if(s==='running'||s==='break'){btn.textContent='⏸ 暂停';btn.className='btn-main pause';btn.disabled=false}
    else if(s==='paused'){btn.textContent='▶ 继续';btn.className='btn-main resume';btn.disabled=false}
  }
  if(stopBtn)stopBtn.disabled=timer.status==='idle';

  // Disable settings when running
  document.querySelectorAll('.pomo-config input').forEach(i=>i.disabled=timer.status!=='idle');

  // Read settings if idle
  if(timer.status==='idle'){
    timer.workSec=(parseInt(document.getElementById('pomo-work')?.value)||25)*60;
    timer.breakSec=(parseInt(document.getElementById('pomo-break')?.value)||5)*60;
    timer.totalCycles=parseInt(document.getElementById('pomo-cycles')?.value)||1;
  }

  // History
  if(hist&&timer.sessions.length){
    hist.innerHTML=timer.sessions.map(s=>
      '<div class="h-item"><span>'+s.subject+' · '+(s.topic||'—')+'</span><span>'+s.duration_display+'</span></div>'
    ).join('');
  }
}

function pomoMainAction(){

  else if(s==='running'||s==='break')pomodoro('pause');
  else if(s==='paused')pomodoro('resume');
}

function startNextCycle(){timer.currentCycle++;timer.status='running';timer.startTs=Date.now();timer.pausedOffset=0;updateTimerUI();if(Notification.permission==='granted')new Notification('☕ 休息结束！',{body:'开始第'+timer.currentCycle+'/'+timer.totalCycles+'轮学习'})}
function finishAll(){timer={status:'idle',subject:'',topic:'',startTs:0,pausedOffset:0,workSec:timer.workSec,breakSec:timer.breakSec,totalCycles:timer.totalCycles,currentCycle:0,sessions:[]};updateTimerUI();updateStats();if(Notification.permission==='granted')new Notification('🎉 全部完成！')}

async function pomodoro(cmd){
  if(cmd==='start'){
    timer.subject=getInputVal('pomo-subject')||'未分类';timer.topic=getInputVal('pomo-topic');
    timer.workSec=(parseInt(document.getElementById('pomo-work').value)||25)*60;
    timer.breakSec=(parseInt(document.getElementById('pomo-break').value)||5)*60;
    timer.totalCycles=parseInt(document.getElementById('pomo-cycles').value)||1;
    timer.currentCycle=1;timer.status='running';timer.startTs=Date.now();timer.pausedOffset=0;timer.sessions=[];
    await apiPOST('/pomodoro',{command:'start',subject:timer.subject,topic:timer.topic});
    if(Notification.permission==='default')Notification.requestPermission();
  }else if(cmd==='pause'){timer.status='paused';timer.pausedOffset=getElapsed();await apiPOST('/pomodoro',{command:'pause',subject:timer.subject,topic:timer.topic})}
  else if(cmd==='resume'){timer.status=isBreakMode()?'break':'running';timer.startTs=Date.now();timer.pausedOffset=0;await apiPOST('/pomodoro',{command:'resume',subject:timer.subject,topic:timer.topic})}
  else if(cmd==='stop'){if(!isBreakMode()){const r=await apiPOST('/pomodoro',{command:'stop',subject:timer.subject,topic:timer.topic});if(r.success&&r.session){timer.sessions.push(r.session);sessions.push(r.session)}}finishAll()}
  updateTimerUI();
}

function renderEbbinghaus(){
  const container=document.getElementById('hm-grid');if(!container)return;
  const countdown=document.getElementById('hm-countdown');
  const reviewTasks=(plan.tasks||[]).filter(t=>t.is_review);
  const today=new Date();const todayStr=today.toISOString().slice(0,10);

  // 倒计时
  if(countdown){const exam=new Date('2026-08-31');const diff=Math.ceil((exam-today)/86400000);countdown.textContent=diff>0?diff:'0'}

  // 有数据时：确保移除空状态残留
  var ec=document.getElementById('hm-container');
  var emptyDiv=ec?ec.querySelector('.hm-empty'):null;
  if(emptyDiv)emptyDiv.remove();
  document.getElementById('hm-progress-bar').style.display='flex';
  document.getElementById('hm-progress-ring').style.display='block';

  if(!reviewTasks.length){
    container.innerHTML='';document.getElementById('hm-legend').innerHTML='';
    document.getElementById('hm-progress-bar').style.display='none';
    document.getElementById('hm-progress-ring').style.display='none';
    if(!ec.querySelector('.hm-empty')){var div=document.createElement('div');div.className='hm-empty';div.innerHTML='🔄 暂无复习任务<br><span style="font-size:.8em;color:var(--text-muted)">制定学习计划后自动生成</span>';ec.appendChild(div)}
    return;
  }

  // 数据聚合: 按日期分组
  var byDate={};reviewTasks.forEach(function(t){var d=t.date||'';if(d){byDate[d]=byDate[d]||[];byDate[d].push(t)}});

  // 计算总统计
  var totalCount=reviewTasks.length;
  var doneCount=reviewTasks.filter(function(t){return t.status==='completed'}).length;
  var overdueCount=reviewTasks.filter(function(t){return t.status!=='completed'&&t.date<todayStr}).length;

  // 构建6周×7天日历网格
  var DAYS_SHORT=['一','二','三','四','五','六','日'];
  var weekStart=new Date(today);weekStart.setDate(today.getDate()-today.getDay()+1);
  var weeks=[];for(var w=0;w<6;w++){var days=[];for(var d=0;d<7;d++){var dt=new Date(weekStart);dt.setDate(weekStart.getDate()+w*7+d);days.push(dt)};weeks.push(days)}

  // 计算每个格子的复习密度
  function getLevel(count){if(count<=0)return 0;if(count===1)return 1;if(count<=2)return 2;if(count<=3)return 3;if(count<=4)return 4;return 5}

  // 头部图例
  var legendEl=document.getElementById('hm-legend');
  var legendHtml='<span class="hm-legend-item"><span class="hm-legend-swatch lv1"></span>1个</span>'+
    '<span class="hm-legend-item"><span class="hm-legend-swatch lv2"></span>2个</span>'+
    '<span class="hm-legend-item"><span class="hm-legend-swatch lv3"></span>3个</span>'+
    '<span class="hm-legend-item"><span class="hm-legend-swatch lv4"></span>4个</span>'+
    '<span class="hm-legend-item"><span class="hm-legend-swatch lv5"></span>5+个</span>'+
    '<span class="hm-legend-item"><span class="hm-legend-swatch done"></span>已完成</span>'+
    '<span class="hm-legend-item"><span class="hm-legend-swatch overdue"></span>逾期</span>';
  legendEl.innerHTML=legendHtml;

  // 构建grid
  var gridHtml='';

  // 表头行: 空角+星期
  gridHtml+='<div class="hm-labels"></div>';
  for(var d=0;d<7;d++){gridHtml+='<div class="hm-dow'+(d>=5?' weekend':'')+'">'+DAYS_SHORT[d]+'</div>'}

  // 每周
  for(var w=0;w<6;w++){
    var weekLabel='W'+(w+1);
    gridHtml+='<div class="hm-labels">'+weekLabel+'</div>';
    for(var d=0;d<7;d++){
      var dt=weeks[w][d];
      var dateStr=dt.toISOString().slice(0,10);
      var tasksOnDay=byDate[dateStr]||[];
      var count=tasksOnDay.length;
      var allDone=count>0?tasksOnDay.every(function(t){return t.status==='completed'}):false;
      var anyOverdue=count>0?tasksOnDay.some(function(t){return t.status!=='completed'&&t.date<todayStr}):false;

      // 未来日期(超出今天) → 空
      if(dt>today&&dateStr!==todayStr){
        gridHtml+='<div class="hm-cell empty"></div>';continue;
      }

      var level=getLevel(count);
      var cls='hm-cell lv'+level;
      var isToday=dateStr===todayStr;
      if(isToday)cls+=' today';
      if(anyOverdue)cls+=' overdue';
      else if(allDone&&count>0)cls+=' done';

      // tooltip
      var tooltip='';
      if(count>0){
        var statusText=anyOverdue?'⚠️ 已逾期':allDone?'✅ 已完成':'📖 待复习';
        var names=tasksOnDay.map(function(t){return t.topic||t.subject}).join(', ');
        tooltip='<div class="hm-tooltip"><div class="tt-date">'+(dt.getMonth()+1)+'/'+dt.getDate()+'</div><div class="tt-status">'+statusText+' ('+count+'项)</div><div class="tt-topics">'+names+'</div></div>';
      }

      gridHtml+='<div class="'+cls+'" title="'+(dt.getMonth()+1)+'/'+dt.getDate()+'">'+tooltip+'</div>';
    }
  }

  container.innerHTML=gridHtml;

  // 进度环
  var ringFg=document.getElementById('hm-ring-fg');
  var ringLabel=document.getElementById('hm-ring-label');
  var pct=totalCount>0?Math.round(doneCount/totalCount*100):0;
  if(ringFg){var circumference=2*Math.PI*20;var offset=circumference*(1-pct/100);ringFg.style.strokeDashoffset=offset}
  if(ringLabel)ringLabel.textContent=pct+'%';

  // 进度条
  var pbFill=document.getElementById('hm-pb-fill');
  var pbLabel=document.getElementById('hm-pb-label');
  if(pbFill)pbFill.style.width=pct+'%';
  if(pbLabel)pbLabel.textContent=doneCount+'/'+totalCount+' ('+pct+'%)';
  document.getElementById('hm-progress-bar').style.display='flex';
  document.getElementById('hm-progress-ring').style.display='block';
}

  h+='<div style="background:#f0fff4;border-radius:8px;padding:10px;font-size:.85em"><div style="font-weight:600;color:#10B981;margin-bottom:4px">✅ 标准答案：</div><div style="white-space:pre-wrap">'+(item.correct_answer||'')+'</div></div>';
  h+='</div><div style="font-size:.8em;color:var(--text-second)">📅 '+(item.last_error_date||item.date||'')+' · 🔍 '+(item.root_cause||'未记录')+'</div>';
  if(item.image)h+='<div style="margin-top:12px"><img src="/'+item.image+'" style="max-width:100%;max-height:200px;border-radius:8px;border:1px solid #eee;cursor:pointer" onclick="window.open(this.src)"></div>';
  content.innerHTML=h;
}

function toggleTheme(){
  var t=document.getElementById('themeToggle');
  var isDark=document.documentElement.getAttribute('data-theme')==='dark';
  if(isDark){
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('theme','light');
    t.classList.remove('dark');
  }else{
    document.documentElement.setAttribute('data-theme','dark');
    localStorage.setItem('theme','dark');
    t.classList.add('dark');
  }
}
(function(){
  var saved=localStorage.getItem('theme');
  var t=document.getElementById('themeToggle');
  if(saved==='dark'||(!saved&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
    document.documentElement.setAttribute('data-theme','dark');

  }
})();

function toggleChat(){
  var p=document.getElementById('chat-panel'),b=document.getElementById('chat-backdrop');
  if(!p)return;var open=!p.classList.contains('open');p.classList.toggle('open');if(b)b.classList.toggle('show');
  if(open){var inp=document.getElementById('chat-input');if(inp)inp.focus()}
}

async function sendChat(){
  var input=document.getElementById('chat-input'),msgs=document.getElementById('chat-msgs');
  if(!input||!msgs)return;var q=input.value.trim();if(!q)return;
  msgs.innerHTML+='<div class="chat-msg user">'+q+'</div>';input.value='';msgs.scrollTop=msgs.scrollHeight;
  var typing=document.getElementById('chat-typing');if(typing)typing.style.display='';
  try{
    var r=await apiPOST('/chat',{question:q});if(typing)typing.style.display='none';
    if(r.answer)msgs.innerHTML+='<div class="chat-msg bot">'+r.answer.replace(/\n/g,'<br>')+'</div>';
    else if(r.fallback)msgs.innerHTML+='<div class="chat-msg bot" style="background:#fff3e0;border-color:#ffcc80;color:#e65100">'+(r.error||'')+'<br><br>提示：可以在主对话框直接跟如意学伴对话哦 👆</div>';
    else msgs.innerHTML+='<div class="chat-msg bot">❌ '+(r.error||'出错了')+'</div>';
  }catch(e){if(typing)typing.style.display='none';msgs.innerHTML+='<div class="chat-msg bot">❌ 网络错误，请检查服务器</div>'}
  msgs.scrollTop=msgs.scrollHeight;
}
// ==== 刷题 ====
let quizQuestions = [];
let quizIdx = 0;
let quizStats = {total: 0, correct: 0, wrong: 0};
let quCurrent = null;

function cleanDisplay(t) {
    return (t || '').replace(/\*\*/g, '').replace(/###\s+/g, '').replace(/```\w*\n?/g, '').replace(/\n-{3,}\n?/g, '\n').replace(/\n{3,}/g, '\n\n');
}

async function searchQuiz() {
    var s = getInputVal('qz-subject');
    var t = getInputVal('qz-topic');
    var q = getInputVal('qz-qtype');
    if (!s && !t) { alert('请选择科目或输入知识点'); return; }
    document.getElementById('qz-loading').style.display = 'block';
    document.getElementById('qz-card').style.display = 'none';
    document.getElementById('qz-empty').style.display = 'none';
    try {
        var r = await apiPOST('/quiz/search', {subject: s, topic: t, count: 5, type: q});
        quizQuestions = r.questions || [];
        quizIdx = 0;
        if (quizQuestions.length) {
            showQuestion(0);
        } else {
            document.getElementById('qz-loading').style.display = 'none';
            document.getElementById('qz-empty').style.display = 'block';
            document.getElementById('qz-empty').innerHTML = '<div style="font-size:3em;margin-bottom:12px">😔</div><div>未找到题目</div>';
        }
    } catch (e) {
        document.getElementById('qz-loading').style.display = 'none';
    }
}

function showQuestion(i) {
    if (i >= quizQuestions.length) {
        document.getElementById('qz-empty').style.display = 'block';
        document.getElementById('qz-card').style.display = 'none';
        return;
    }
    quCurrent = quizQuestions[i];
    quizIdx = i;
    document.getElementById('qz-loading').style.display = 'none';
    document.getElementById('qz-empty').style.display = 'none';
    document.getElementById('qz-card').style.display = 'block';
    document.getElementById('qz-subj-badge').textContent = quCurrent.subject || '';
    document.getElementById('qz-topic-tag').textContent = quCurrent.topic || '';
    document.getElementById('qz-type-tag').textContent = (quCurrent.type === 'choice') ? '📋 选择题' : '📝 简答题';
    var srcMap = {kb: '📖 知识库', cached: '💾 题库', ai_generated: '🤖 AI'};
    document.getElementById('qz-source').textContent = srcMap[quCurrent.source] || '';
    document.getElementById('qz-content').innerText = cleanDisplay(quCurrent.content || '');
    var cd = document.getElementById('qz-choices');
    var sa = document.getElementById('qz-short-area');
    if (quCurrent.type === 'choice' && quCurrent.options && quCurrent.options.length) {
        cd.style.display = 'block';
        sa.style.display = 'none';
        var listHtml = '';
        for (var j = 0; j < quCurrent.options.length; j++) {
            var o = quCurrent.options[j];
            listHtml += '<label style="display:flex;align-items:center;gap:8px;padding:8px 12px;border:2px solid #ddd;border-radius:8px;cursor:pointer;font-size:.9em">';
            listHtml += '<input type="radio" name="qz-choice" value="' + o + '" style="accent-color:var(--brand)">' + o;
            listHtml += '</label>';
        }
        document.getElementById('qz-choices-list').innerHTML = listHtml;
    } else {
        cd.style.display = 'none';
        sa.style.display = 'flex';
        document.getElementById('qz-answer').value = '';
    }
    var fb = document.getElementById('qz-feedback');
    fb.style.display = 'none';
    fb.classList.remove('correct', 'wrong');
    document.getElementById('qz-submit').disabled = false;
    document.getElementById('qz-next').disabled = true;
    if (quCurrent.type !== 'choice') document.getElementById('qz-answer').focus();
}

async function submitQuiz() {
    if (!quCurrent) return;
    var ans;
    if (quCurrent.type === 'choice') {
        var ck = document.querySelector('input[name="qz-choice"]:checked');
        if (!ck) { alert('请选择一个选项'); return; }
        ans = ck.value;
    } else {
        ans = getInputVal('qz-answer');
        if (!ans) { alert('请输入答案'); return; }
    }
    document.getElementById('qz-submit').disabled = true;
    var fb = document.getElementById('qz-feedback');
    fb.style.display = 'block';
    fb.classList.remove('correct', 'wrong');
    document.getElementById('qz-fb-verdict').textContent = '⏳ 批改中...';
    document.getElementById('qz-fb-icon').textContent = '';
    document.getElementById('qz-fb-analysis').textContent = '';
    document.getElementById('qz-fb-kp').innerHTML = '';
    try {
        var r = await apiPOST('/quiz/submit', {question_id: quCurrent.id, user_answer: ans, question: quCurrent});
        quizStats.total++;
        if (r.correct) {
            quizStats.correct++;
            fb.classList.add('correct');
        } else {
            quizStats.wrong++;
            fb.classList.add('wrong');
        }
        document.getElementById('qz-fb-icon').textContent = r.correct ? '✅' : '❌';
        document.getElementById('qz-fb-verdict').textContent = r.correct ? '正确！' : '有误';
        document.getElementById('qz-fb-analysis').textContent = r.analysis || '';
        var kp = document.getElementById('qz-fb-kp');
        var kpHtml = '';
        var pts = r.knowledge_points || [];
        for (var k = 0; k < pts.length; k++) {
            kpHtml += '<span>' + pts[k] + '</span>';
        }
        kp.innerHTML = kpHtml;
        if (r.auto_mistake_added) {
            kp.innerHTML += '<span style="background:#FEE2E2;color:#DC2626">📝 已入错题本</span>';
        }
        document.getElementById('qz-next').disabled = false;
        updateQuizStats();
    } catch (e) {
        document.getElementById('qz-fb-icon').textContent = '❌';
        document.getElementById('qz-fb-verdict').textContent = '批改失败: ' + e.message;
    }
}

function nextQuiz() {
    var i = quizIdx + 1;
    if (i >= quizQuestions.length) {
        document.getElementById('qz-card').style.display = 'none';
        document.getElementById('qz-empty').style.display = 'block';
        var rate = quizStats.total ? Math.round(quizStats.correct / quizStats.total * 100) : 0;
        document.getElementById('qz-empty').innerHTML = '<div style="font-size:3em;margin-bottom:12px">🎉</div><div>正确率：' + rate + '%</div><button class="btn btn-start" style="margin-top:12px" onclick="searchQuiz()">🔄 再来一组</button>';
        return;
    }
    showQuestion(i);
}

function updateQuizStats() {
    document.getElementById('qz-stats').style.display = 'block';
    document.getElementById('qz-total').textContent = quizStats.total;
    document.getElementById('qz-correct').textContent = quizStats.correct;
    document.getElementById('qz-wrong').textContent = quizStats.wrong;
}

async function updateQuizRecommendations() {
    try {
        var r = await apiPOST('/quiz/recommend', {});
        var d = document.getElementById('qz-recs');
        var e = document.getElementById('qz-recs-empty');
        if (!r.recommendations || !r.recommendations.length) {
            d.innerHTML = '';
            e.style.display = 'block';
            return;
        }
        e.style.display = 'none';
        var recsHtml = '';
        for (var j = 0; j < r.recommendations.length; j++) {
            var x = r.recommendations[j];
            recsHtml += '<div class="rec-item" onclick="document.getElementById(&quot;qz-subject&quot;).value=&quot;' + x.subject + '&quot;;searchQuiz()">';
            recsHtml += '<div><div style="font-weight:600;font-size:.85em">' + x.subject + '</div>';
            recsHtml += '<div style="font-size:.75em;color:var(--sub)">' + x.topic + '</div></div>';
            recsHtml += '<div style="color:#EF4444;font-size:.75em">错' + x.error_count + '次</div></div>';
        }
        d.innerHTML = recsHtml;
    } catch (e) {}
}
